<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6F4E37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C42;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cup" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8F0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5E6D0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)" />

  <!-- Cup body -->
  <path d="M18 28 L20 48 Q20 50 22 50 L42 50 Q44 50 44 48 L46 28 Z"
        fill="url(#cup)" stroke="rgba(111,78,55,0.3)" stroke-width="0.8"/>

  <!-- Saucer -->
  <ellipse cx="32" cy="51" rx="16" ry="3" fill="#E8C9A0" opacity="0.8"/>

  <!-- Cup handle -->
  <path d="M44 32 Q54 32 54 39 Q54 46 44 46"
        fill="none" stroke="#F5E6D0" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Coffee surface inside cup -->
  <ellipse cx="32" cy="30" rx="12" ry="3" fill="#7B4F2E" opacity="0.9"/>

  <!-- Steam lines -->
  <path d="M26 24 Q25 20 27 17 Q29 14 27 11" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M32 22 Q31 18 33 15 Q35 12 33 9"  fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M38 24 Q37 20 39 17 Q41 14 39 11" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Sparkle (AI indicator) -->
  <circle cx="51" cy="14" r="4" fill="#FF8C42" opacity="0.9"/>
  <path d="M51 11 L51 17 M48 14 L54 14" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
</svg>